services:
  customers-api-dev:
    build: .
    container_name: customers-api-dev
    ports:
      - "8080:8080"
    env_file:
      - .env.dev
    environment:
      NODE_ENV: dev
    volumes:
      - customers_data_dev:/app/data

  customers-api-prod:
    build: .
    container_name: customers-api-prod
    ports:
      - "9090:9090"
    env_file:
      - .env.prod
    environment:
      NODE_ENV: prod
    volumes:
      - customers_data_prod:/app/data

volumes:
  customers_data_dev:
  customers_data_prod: